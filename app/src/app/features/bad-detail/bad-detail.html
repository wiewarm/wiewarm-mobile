<app-loading-error
  [state]="detailResource.isLoading() ? 'loading' : detailResource.error() ? 'error' : 'idle'"
></app-loading-error>

<div class="bad-detail">
  <a routerLink="/" class="back-link" aria-label="Zurück zur Übersicht">
    <app-icon class="back-icon" symbolId="#arrow_back" />
    <span class="back-text">zurück</span>
  </a>
  @let dRes = detailResource.value(); @if (dRes) {
  <div class="detail-hero">
    @let bItem = badItem();
    <app-favorite-button [item]="bItem" variant="overlay" />
  </div>
  <section class="address-section" aria-labelledby="address-heading">
    <h2 id="address-heading" class="adress-title">Adresse</h2>
    @if (canEdit()) { @defer (when canEdit()) {
    <app-address-item-edit
      [detail]="dRes"
      (saved)="refetchDetail()"
    ></app-address-item-edit>
    } @placeholder {
    <app-address-item [detail]="dRes"></app-address-item>
    } } @else {
    <app-address-item [detail]="dRes"></app-address-item>
    }
  </section>

  <section class="pools-section" aria-labelledby="becken-heading">
    <h2 id="becken-heading" class="becken-title">Becken und Temperaturen</h2>
    <ul class="pool-list">
      @for (pool of poolEntries(dRes); track pool.beckenid) {
      <app-pool-item [pool]="pool"></app-pool-item>
      }
    </ul>
  </section>

  <section class="images-section" aria-labelledby="img-heading">
    <app-img-item [detail]="dRes"></app-img-item>
  </section>
  }
</div>
