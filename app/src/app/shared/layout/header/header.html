@if (auth.showLogin()) {
<dialog app-auth-dialog (close)="auth.closeLogin()"></dialog>
}

<div class="header-content">
  <div class="branding" aria-label="App Icon und Name">
    <img
      class="app-icon"
      src="assets/img/sonne.svg"
      alt="Icon lachende Sonne"
    />
    <div class="brand-copy" aria-hidden="true">
      <span class="app-title">{{ title }}</span>
    </div>
    <app-menu-bar />
  </div>
  <div class="header-actions">
    <button
      class="theme-toggle"
      [class.flipped]="darkMode()"
      (click)="toggleDarkMode()"
      [attr.aria-label]="darkMode() ? 'Wechsel zu Light Mode' : 'Wechsel zu Dark Mode'"
      [attr.aria-pressed]="darkMode()"
    >
      <app-icon
        class="theme-emoji"
        [symbolId]="darkMode() ? '#light_mode' : '#dark_mode'"
      />
    </button>
    <button
      class="auth-toggle"
      [class.is-logged-in]="auth.isLoggedIn()"
      type="button"
      (click)="this.auth.openLogin()"
      [attr.aria-label]="auth.isLoggedIn() ? ('Eingeloggt mit Bad-Id ' + auth.session()?.badId) : 'Anmelden'"
    >
      @if (auth.isLoggedIn()) {
      <span class="auth-id">{{ auth.session()?.badId }}</span>
      } @else {
      <app-icon symbolId="#person" />
      }
    </button>
  </div>
</div>
