@if (showLogin()) { @defer (when showLogin()) {
<dialog app-auth-dialog (close)="closeLogin()"></dialog>
} }

<div class="header-content">
  <div class="branding" aria-label="App Icon und Name">
    <img
      class="app-icon"
      src="assets/img/sonne.svg"
      alt="Icon lachende Sonne"
    />
    <div class="brand-copy" aria-hidden="true">
      <span class="app-title">{{ title }}</span>
    </div>
    <app-menu-bar />
  </div>
  <div class="header-actions">
    <button
      class="auth-toggle"
      style="display: none"
      [class.is-logged-in]="auth.isLoggedIn()"
      type="button"
      (click)="openLogin()"
      [attr.aria-label]="auth.isLoggedIn() ? ('Eingeloggt mit Bad-Id ' + auth.session()?.badId) : 'Anmelden'"
    >
      @if (auth.isLoggedIn()) {
      <app-icon symbolId="#person" />
      } @else {
      <p class="auth-login-label">Login</p>
      <app-icon class="auth-login-icon" symbolId="#person" />
      }
    </button>
  </div>
</div>
